name = "ui_debugger"
description = "Browser-focused frontend debugger for CRM UI flows, console errors, network errors, responsive layout, forms, tables, and calendar interactions."
model_reasoning_effort = "high"
sandbox_mode = "workspace-write"
developer_instructions = [
